<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Author" content="Eunkwang Choi" />
  <meta http-equiv="Copyright" content="기호교육" />
  <title>기호교육 등급 변환기</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <header class="header">
    <h1>등급 변환기 1.0b ⓒ기호교육</h1>

    <button id="layoutToggle">
      화면 전환
    </button>
  </header>


  <main id="mainContainer" class="horizontal">

    <!-- SECTION 1 : INPUT / RESULT -->
    <section class="panel" id="inputPanel">

      <div class="modeSelector">

        <label>
          <input type="radio" name="mode" value="g1" checked />
          9등급 → 5등급
        </label>

        <label>
          <input type="radio" name="mode" value="g2" />
          5등급 → 9등급
        </label>

      </div>


      <div class="inputBlock">

        <label for="gradeInput">
          등급 값:
        </label>

        <input
          id="gradeInput"
          type="number"
          step="0.01"
          min="1"
          max="9"
          placeholder="Enter value"
        />

      </div>


      <div class="resultBlock">

        <div class="resultItem">
          <div class="label">상</div>
          <div id="resultUpper" class="value">-</div>
        </div>

        <div class="resultItem">
          <div class="label">평균</div>
          <div id="resultMean" class="value">-</div>
        </div>

        <div class="resultItem">
          <div class="label">하</div>
          <div id="resultLower" class="value">-</div>
        </div>

      </div>


      <div id="statusMessage" class="status"></div>
	  
    </section>


	<!-- IMAGE BETWEEN PANELS -->
	<div class="panelDivider" id="panelDivider"></div>
	

    <!-- SECTION 2 : TABLE VIEW -->
    <section class="panel" id="tablePanel">

      <table id="gradeTable">

        <thead>
          <tr>
            <th>등급구간</th>
            <th id="tableInputLabel">9등급</th>
            <th id="tableUpperLabel">5등급(상)</th>
            <th id="tableMeanLabel">5등급(평균)</th>
            <th id="tableLowerLabel">5등급(하)</th>
          </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>

      </table>

    </section>

  </main>


  <!-- DATA -->
  <script src="data/g1_9to5.js"></script>
  <script src="data/g2_5to9.js"></script>

  <!-- LOGIC -->
  <script src="js/validate.js"></script>
  <script src="js/lookup.js"></script>
  <script src="js/interpolate.js"></script>
  <script src="js/tableRender.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
